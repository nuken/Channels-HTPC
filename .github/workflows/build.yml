name: Build and Package Channels HTPC

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

# --- NEW: Forces GitHub to use the new Node 24 engine and silences the warning ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish .NET Application
      run: dotnet publish ChannelsNativeTest.csproj -c Release -r win-x64

    - name: Compile Inno Setup Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" ChannelsInstaller.iss

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChannelsHTPC-Installer
        path: Output/ChannelsHTPC_Alpha_Setup.exe
